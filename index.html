<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Clima App</title>

  <link
    rel="stylesheet"
    href="./css/styles.css"
  >

</head>

<body>

  <div class="container">

    <h1>Clima App</h1>

    <div class="search-box">

      <input
        id="cityInput"
        type="text"
        placeholder="Bogotá, Medellín, Cali"
      >

      <button id="searchBtn">
        Buscar
      </button>

    </div>

    <div
      id="loading"
      class="loading"
    >
      Cargando...
    </div>

    <div id="weatherResult"></div>

  </div>

  <script
    type="module"
    src="./js/app.js"
  ></script>

</body>
</html>
